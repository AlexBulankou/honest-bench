# Refresh the gke-kata (Kata Containers / microVM) honest-benchmark cold
# true_ttfe cells — MANUAL, ON-DEMAND Cloud Build trigger. De-manuals the
# hand-run cold-true_ttfe sweep + graduation refresh for the sandbox-kata product.
#
# Fleet rule: NO GitHub Actions — Cloud Build ONLY. This config binds to a MANUAL
# trigger (no branch/PR/schedule wiring), so nothing fires unattended. Fire by hand:
#   gcloud builds triggers run hb-refresh-gke-kata --project=<PROJECT> \
#     --substitutions=_CLUSTER=<kata-scenarios-cluster>,_REGION=us-central1
#
# ON-DEMAND, NOT STANDING — and NOT ephemeral. Unlike the gVisor refresh (which
# spins a FRESH ephemeral cluster per fire), this refresh authenticates to the
# EXISTING, PERSISTENT kata scenarios cluster and runs against its scale-to-zero
# kata node pool. There is no cluster create and no teardown here: the standing
# cluster is a shared resource this build only reads + fires benchmark claims
# against, never provisions or tears down. That is deliberate — a LOW-priority,
# no-correctness durability refresh does not warrant its own ephemeral cluster
# spend, a standing CronJob, or a Cloud Scheduler entry; on-demand is the right
# shape (and sidesteps the standing-collision-ack requirement a scheduled fire
# would incur).
#
# COLLISION-ACK IS A FIRE-TIME OPERATOR PRECONDITION. The kata scenarios cluster
# is SHARED. This build fires REAL cold SandboxClaims (a step-up sweep) and a full
# n=30 graduation suite against it, which scales the kata pool 0 -> N and consumes
# real capacity. Before firing this trigger, the operator MUST obtain a peer
# collision-ack that no concurrent workload is running on the cluster (an
# acker-authored, linked artifact — a peer comment/FM, never a paraphrase). The
# pre-fire cold-honesty guard below is a mechanical BACKSTOP for that ack, not a
# substitute: it fails closed if any kata node is already resident (which would
# mean either a warm cache or a concurrent workload), but a passing guard does not
# by itself establish that a peer cleared the window.
#
# WHAT IT DOES:
#   1. get-credentials for the persistent kata cluster (NO create).
#   2. Read-only precondition: assert the SandboxClaim CRD + the standing
#      agent-sandbox-controller Deployment are present (this build NEVER installs
#      or mutates the operator on the shared cluster).
#   3. Cold-honesty guard: assert 0 resident kata nodes before trusting "cold".
#   4. Fire the honest kata cold step-up sweep (scripts/kata_cold_ttfe_sweep.py) ->
#      a BENCH_SLO_SWEEP record carrying the cold true_ttfe pareto.
#   5. Run the full sandbox-kata graduation suite (harness.run --product
#      sandbox-kata) at the published n=30 shape, merging the sweep's cold
#      true_ttfe triple into scenarios[0].sla_metrics.thpt_slo_basis=true_ttfe.
#   6. Render, run public-safety fail-closed, and open a PR with the result.
#
# Honest by construction: the cold-honesty guard means every cold sample pays the
# real VM-boot + kata-runtime-init cost from an empty containerd cache; the sweep's
# true_ttfe basis is only trusted if webhook-stamped claims corroborate it
# (fail-closed read-back guard in the derive path), else it drops to the literal
# upper bound; harness.run refuses to publish a lower-n regression, so a mis-fired
# refresh cannot silently downgrade the graduated cells.
#
# AUTH — NATIVE CB SERVICE ACCOUNT, NO WIF. Reuses the SAME dedicated
# least-privilege refresh SA as the gVisor refresh (REFRESH_SA in
# scripts/setup-cloud-build-triggers.sh). It needs, on the target project:
#   - roles/container.admin        (get-credentials + kubectl against the cluster)
#   - roles/iam.serviceAccountUser (act-as on cluster access)
#   - roles/compute.viewer         (cluster metadata reads)
# and Secret Accessor on the GitHub-token secret below. Project-specific SA +
# project + the internal cluster name are kept OUT of this public file — the
# cluster name is passed at fire time via the _CLUSTER substitution; see the
# parametrized scripts/setup-cloud-build-triggers.sh for the trigger-creation
# commands.

substitutions:
  # The persistent kata scenarios cluster name. Intentionally EMPTY-defaulted and
  # kept out of this public file — pass it at fire time via --substitutions so the
  # internal cluster name never ships in the repo. The measure step fails closed
  # (FATAL) if this is empty.
  _CLUSTER: ""
  _REGION: "us-central1"

steps:
  # Single orchestration step: auth -> preconditions -> cold-honesty guard ->
  # sweep -> graduation refresh -> render -> public-safety. No cluster create and
  # no teardown trap (this runs against the standing cluster, which this build must
  # never provision or delete) — the only trap kills the background node sampler.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: measure
    entrypoint: bash
    env:
      # Full kata graduation shape (recipe/REPRODUCE.md, "Refreshing published
      # cells" — Kata block). A refresh without these knobs would re-measure the
      # graduated cells at n=5 / n=1, which the harness refuses (check_n_regression).
      - "BENCH_CLUSTER_SUBSTRATE=gke-kata"
      - "WARMPOOL_COLD_START_RUNTIME_CLASS=kata-clh"
      - "WARMPOOL_COLD_START_POOL_REPLICAS=30"
      - "WARMPOOL_COLD_START_CLAIM_COUNT=40"
      - "WARMPOOL_COLD_START_WARMUP_TIMEOUT_S=600"
      - "WARMPOOL_COLD_START_BIND_TIMEOUT_S=600"
      - "NATIVE_DIGEST_COLD_RUNTIME_CLASS=kata-clh"
      - "NATIVE_DIGEST_COLD_SAMPLES=30"
      - "BENCH_TTFE_EXEC=1"
      # Merge the cold step-up sweep's true_ttfe pareto into the warmpool_cold_start
      # cell's thpt_slo_basis. Fixed /workspace path written by the sweep step
      # below (runs before harness.run within this same step). "One product per
      # shell" holds — this build fires only sandbox-kata, and the derive path's
      # runtime-match gate on params.runtime_class guards cross-contamination.
      - "BENCH_SLO_SWEEP_WARMPOOL_COLD_START=/workspace/kata-cold-ttfe-sweep.json"
    args:
      - -c
      - |
        set -euo pipefail

        # CB's substitution scanner reads the WHOLE step string (this script and
        # its comments included) and rejects any bare dollar-prefixed all-caps
        # token it doesn't recognize as a built-in or a defined substitution — so
        # every local bash variable below is dereferenced with a DOUBLED leading
        # dollar sign (CB-escaped -> a single dollar at runtime), never a single one.
        CLUSTER="${_CLUSTER}"
        REGION="${_REGION}"
        if [ -z "$$CLUSTER" ]; then
          echo "==> FATAL: _CLUSTER substitution is empty. Pass the kata scenarios cluster name at fire time:"
          echo "==>   gcloud builds triggers run hb-refresh-gke-kata --project=<PROJECT> --substitutions=_CLUSTER=<cluster>,_REGION=us-central1"
          echo "==> (the internal cluster name is intentionally not shipped in this public config.)"
          exit 1
        fi

        # Kill the background node sampler on any exit path. There is NO cluster
        # teardown here — the standing cluster is never provisioned or deleted by
        # this build (the deliberate MINUS vs. the ephemeral gVisor refresh).
        cleanup() {
          kill "$${NODE_SAMPLER_PID:-}" 2>/dev/null || true
        }
        trap cleanup EXIT

        # kubeconfig isolated to /workspace so we never touch a shared path.
        export KUBECONFIG=/workspace/hb-refresh.kubeconfig

        echo "==> authenticating to the persistent kata scenarios cluster (NO create — standing cluster)"
        gcloud container clusters get-credentials "$$CLUSTER" --region "$$REGION"

        # READ-ONLY precondition: the standing controller must already be
        # installed. This build never installs or mutates the operator on the
        # shared cluster — it only asserts the fulfilment chain is present before
        # firing real claims against it.
        echo "==> read-only precondition: SandboxClaim CRD + agent-sandbox-controller Deployment present"
        kubectl get crd sandboxclaims.agents.x-k8s.io >/dev/null
        kubectl -n agent-sandbox-system get deploy agent-sandbox-controller >/dev/null

        # COLD-HONESTY GUARD (the pre-fire assertion #5459 exists to automate): a
        # genuine cold true_ttfe requires the kata pool scaled to ZERO resident
        # nodes, so the first claim pays the real VM-boot + kata-runtime-init cost
        # against an empty containerd cache. A non-zero count means either a warm
        # cache (would understate cold ttfe) OR a concurrent workload (a collision
        # on the shared cluster) — both are fatal. Keyed on the PUBLIC upstream
        # kata-containers node label, never the internal pool name.
        echo "==> cold-honesty guard: asserting 0 resident kata nodes before trusting 'cold'"
        kata_nodes=$(kubectl get nodes -l katacontainers.io/kata-runtime=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
        if [ "$$kata_nodes" != "0" ]; then
          echo "==> FATAL: $$kata_nodes resident kata node(s) — pool is not cold (warm cache or a concurrent workload)."
          echo "==> A cold true_ttfe refresh requires the kata pool scaled to 0. Confirm the collision-ack window is clear and the pool has drained, then re-fire."
          kubectl get nodes -l katacontainers.io/kata-runtime=true || true
          exit 1
        fi
        echo "==> cold-honesty guard passed: kata pool at 0 nodes"

        # Harness deps. The cloud-sdk image's python3 is PEP-668 externally-managed,
        # so --break-system-packages is required (container is ephemeral — safe).
        pip install --quiet --no-cache-dir --break-system-packages -r harness/requirements.txt

        # Background node-count sampler (diagnostic): the kata pool autoscales 0->N
        # under the sweep + graduation burst; sampling its node count across the
        # whole measure phase lets a future "warm slower than cold" anomaly be
        # attributed to a reactive scale-up landing inside the measured window,
        # straight from the build log. Read-only, keyed on the public kata label,
        # best-effort (a sampler hiccup must never fail the measure step). Each
        # sample is streamed as it's taken (prefixed kata-node-sample) so a late
        # log-sink gap can't lose the whole series.
        NODE_SAMPLE_LOG=/workspace/kata-node-count-sample.log
        : > "$$NODE_SAMPLE_LOG"
        ( while true; do
            sample="kata-node-sample $(date -u +%FT%TZ) nodes=$(kubectl get nodes -l katacontainers.io/kata-runtime=true --no-headers 2>/dev/null | wc -l | tr -d ' ')"
            echo "$$sample" || true
            printf '%s\n' "$$sample" >> "$$NODE_SAMPLE_LOG" 2>/dev/null || true
            sleep 3
          done ) &
        NODE_SAMPLER_PID=$$!

        # Step 1 — honest kata cold step-up sweep -> BENCH_SLO_SWEEP record. Run
        # with PYTHONPATH=/workspace so the script's `from harness... import` lines
        # resolve (running `python3 scripts/x.py` puts scripts/ on sys.path[0], not
        # the repo root).
        echo "==> firing honest kata cold true_ttfe sweep"
        KATA_SWEEP_OUT=/workspace/kata-cold-ttfe-sweep.json PYTHONPATH=/workspace \
          python3 scripts/kata_cold_ttfe_sweep.py

        # Step 2 — full graduation refresh, merging the sweep's cold true_ttfe
        # triple (BENCH_SLO_SWEEP_WARMPOOL_COLD_START, set in env: above).
        echo "==> running sandbox-kata harness (full graduation shape + sweep merge)"
        python3 -m harness.run --product sandbox-kata

        kill "$$NODE_SAMPLER_PID" 2>/dev/null || true
        echo "==> kata pool node count over the measure window (diagnostic recap):"
        cat "$$NODE_SAMPLE_LOG" 2>/dev/null || echo "(no samples captured)"

        echo "==> rendering README/DETAILS from results"
        python3 -m render.generate

        echo "==> public-safety gate (fail-closed)"
        bash scripts/check-public-safety.sh

  # Open the refresh PR — runs only if `measure` succeeded. Uses a narrow-scope
  # GitHub token from Secret Manager. Mirrors the gVisor refresh's open-pr step,
  # scoped to the sandbox-kata result path + a kata-specific branch.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: open-pr
    entrypoint: bash
    secretEnv: ['GITHUB_TOKEN']
    args:
      - -c
      - |
        set -euo pipefail

        # No result change -> nothing to PR.
        if git diff --quiet -- sandbox-kata/results/latest.json README.md DETAILS.md; then
          echo "No benchmark diff to publish — skipping PR."
          exit 0
        fi

        # $$ escapes CB's substitution engine so GITHUB_TOKEN is read at runtime
        # from secretEnv, not as a build substitution at submit time.
        git config --global url."https://x-access-token:$${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        git config --global user.name "honest-bench-refresh"
        git config --global user.email "refresh@localhost"

        BRANCH="auto/refresh-gke-kata"
        git checkout -B "$$BRANCH"
        git add sandbox-kata/results/latest.json README.md DETAILS.md
        git commit -m "data: auto-refresh benchmark results (substrate=gke-kata, cold true_ttfe)"

        # A fresh CB clone fetches only main, so it has no remote-tracking ref for
        # origin/BRANCH — establish it first so --force-with-lease has an accurate
        # baseline (tolerated no-op on the very first refresh).
        git fetch origin "+$$BRANCH:refs/remotes/origin/$$BRANCH" 2>/dev/null || true
        git push --force-with-lease origin "$$BRANCH"

        BODY="Automated gke-kata (Kata Containers / microVM) cold true_ttfe benchmark refresh from a manual Cloud Build dispatch. substrate: gke-kata (persistent scenarios cluster, scale-to-zero kata pool — cold-honesty guard confirmed 0 resident kata nodes before firing); cold step-up sweep assembled the true_ttfe pareto and the full n=30 graduation suite merged it into the warmpool_cold_start cell; results regenerated from sandbox-kata/results/latest.json; public-safety scanner passed (fail-closed gate before this PR opened). Review the headline change before merge."
        api="https://api.github.com/repos/AlexBulankou/honest-bench/pulls"
        existing=$(curl -sS -H "Authorization: Bearer $${GITHUB_TOKEN}" \
          "$api?head=AlexBulankou:$$BRANCH&state=open")
        existing_url=$(echo "$existing" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[0]["html_url"] if d else "")')
        if [ -n "$existing_url" ]; then
          echo "A PR for $$BRANCH is already open — pushed the update to it."
          echo "$existing_url" > /workspace/pr_url.txt
          exit 0
        fi
        payload=$(python3 -c 'import json,sys; print(json.dumps({"title":"data: auto-refresh gke-kata cold true_ttfe benchmark headline","head":sys.argv[1],"base":"main","body":sys.argv[2]}))' "$$BRANCH" "$$BODY")
        pr_response=$(curl -sS -X POST -H "Authorization: Bearer $${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" "$api" -d "$payload")
        echo "$pr_response"
        echo "$pr_response" | python3 -c 'import sys,json; print(json.load(sys.stdin)["html_url"])' > /workspace/pr_url.txt

  # Proactively surface a >=NORTH_STAR_DELTA_FACTOR swing or a verdict flip to the
  # #s-dev room at publish time. Reuses _north_star_delta_caveat (imported, not
  # reimplemented) with the SAME two-arg (sandbox + sandbox-kata) call the in-page
  # render does, so a Kata-only p95 swing or verdict flip can't be missed. Runs
  # only if open-pr opened/updated a PR this fire; no-op when the caveat is empty.
  - name: python:3.12-slim
    id: sdev-delta-notify
    waitFor: ['open-pr']
    entrypoint: bash
    secretEnv: ['HB_SDEV_WEBHOOK']
    args:
      - -c
      - |
        set -euo pipefail
        if [ ! -f /workspace/pr_url.txt ]; then
          echo "No PR opened this run — nothing to notify."
          exit 0
        fi
        PR_URL=$$(cat /workspace/pr_url.txt)
        cd /workspace
        PR_URL="$$PR_URL" python3 <<'PYEOF'
        import importlib.util
        import json
        import os
        import sys
        import urllib.request

        # render.py is loaded by explicit file path (same technique
        # render/generate.py uses) because it does a flat `from schema import ...`
        # that only resolves with render/ itself on sys.path.
        sys.path.insert(0, "/workspace/render")
        _spec = importlib.util.spec_from_file_location("_bench_render", "/workspace/render/render.py")
        _render = importlib.util.module_from_spec(_spec)
        _spec.loader.exec_module(_render)

        with open("sandbox/results/latest.json") as fh:
            results = json.load(fh)

        # Mirror generate.py's own kata_results load so this step evaluates the
        # SAME two-arg call the in-page render does — a one-arg call would silently
        # drop the Kata rows and miss a Kata-only swing or verdict flip, exactly the
        # drift this step exists to prevent. Graceful-degrade to None when absent.
        kata_results = None
        kata_path = "sandbox-kata/results/latest.json"
        if os.path.exists(kata_path):
            with open(kata_path) as fh:
                kata_results = json.load(fh)

        caveat = _render._north_star_delta_caveat(results, kata_results)
        if not caveat:
            print("No refresh-delta flag triggered — nothing to notify.")
            raise SystemExit(0)

        pr_url = os.environ["PR_URL"]
        webhook = os.environ["HB_SDEV_WEBHOOK"]
        text = caveat + "\n\nResults PR: " + pr_url
        body = json.dumps({"text": text}).encode()
        req = urllib.request.Request(
            webhook, data=body, headers={"Content-Type": "application/json"}
        )
        # Best-effort: a webhook 4xx/5xx/timeout must never fail this step, since
        # open-pr already published the real work by the time this runs.
        try:
            urllib.request.urlopen(req, timeout=15)
            print("Posted refresh-delta tripwire to #s-dev.")
        except Exception as exc:
            print("WARNING: refresh-delta chat post failed (non-fatal): %s" % exc)
        PYEOF

availableSecrets:
  secretManager:
    # $PROJECT_ID is a Cloud Build built-in resolved at build time, so the concrete
    # project id never ships in this public file. Same secrets as the gVisor refresh.
    - versionName: projects/$PROJECT_ID/secrets/hb-refresh-github-token/versions/latest
      env: GITHUB_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/hb-sdev-webhook/versions/latest
      env: HB_SDEV_WEBHOOK

options:
  logging: CLOUD_LOGGING_ONLY

# No cluster create/teardown, but the kata cold path is slower than gVisor: the
# pool scales 0 -> N under the step-up sweep (VM boot + kata-runtime init) and the
# full n=30 graduation suite (30-member warmup + 40 claims + 30 serial cold
# microVM samples) runs against microVMs. 90 min gives generous headroom.
timeout: 5400s
