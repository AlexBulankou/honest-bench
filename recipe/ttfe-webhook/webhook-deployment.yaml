apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-deployment
  namespace: agent-sandbox-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: webhook
        # __WEBHOOK_IMAGE_PROJECT__ is rendered to the GCP project id by
        # deploy-ttfe-webhook.sh at apply time (default: `gcloud config get-value project`),
        # so the private project id never lives in this public tree. Tag+digest are pinned
        # (content-addressable) — the image is pre-built from the asbx#761 pinned source.
        image: us-central1-docker.pkg.dev/__WEBHOOK_IMAGE_PROJECT__/honest-bench/webhook-inject-timestamp:asbx-adfe5409@sha256:9177721d8244b7208472229fff31496f52bb1f76bc0f1aadf25903fed3548ac5
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8443
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: certs
          mountPath: /etc/webhook/certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: webhook-certs
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: agent-sandbox-system
spec:
  ports:
  - port: 443
    targetPort: 8443
  selector:
    app: webhook
