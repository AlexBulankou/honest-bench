# Offline unit tests — runs on every PR and push to main.
#
# WHY this exists: the two refresh workflows (refresh.yml, refresh-gke-sandbox.yml)
# are workflow_dispatch-only and run the *refresh* pipeline (harness.run +
# render.generate + public-safety), so nothing ran the repo's unit tests on a PR.
# A change that broke a harness/render/scenario test could land green. This
# workflow closes that gap.
#
# DISCOVER-ALL by design: it finds every `test_*.py` under the repo and runs it,
# rather than carrying an explicit per-file invocation list. An explicit list
# silently drifts the moment someone adds a test file but forgets the list entry
# (the "authored != gated" failure mode). The glob means a new test_*.py is
# gated the instant it is committed — no list to update.
#
# Each test module is self-running via its `if __name__ == "__main__"` guard and
# exits non-zero on failure, so the job runs each as `python3 <path>` from the
# repo root and fails if ANY module exits non-zero (collecting all failures so a
# single run shows every broken module, not just the first).
name: unit-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Most test modules are stdlib-pure, but the render tests import kubernetes
      # at module load, so install the harness deps to cover the whole set.
      # Gate-zero leak scan. check-public-safety.sh (no-arg form) scans the whole
      # git-tracked tree for generic internal-leak patterns and is fail-closed. It
      # is offline (no cluster/network) and previously ran ONLY on the manual
      # refresh workflow — so a PR introducing a leak pattern was never gated. Run
      # it first to fail fast on a leak before spending the test minutes.
      - name: Public-safety leak scan
        run: bash scripts/check-public-safety.sh
      - name: Install dependencies
        run: pip install -r harness/requirements.txt
      - name: Run all test_*.py modules
        run: |
          set -uo pipefail
          mapfile -t tests < <(find . -path ./.git -prune -o -name 'test_*.py' -print | sort)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "ERROR: no test_*.py modules found — discovery glob is broken." >&2
            exit 1
          fi
          echo "Discovered ${#tests[@]} test modules."
          pass=0
          failed=()
          for t in "${tests[@]}"; do
            echo "==> $t"
            if python3 "$t"; then
              pass=$((pass + 1))
            else
              failed+=("$t")
            fi
          done
          echo "----------------------------------------"
          echo "PASS=$pass FAIL=${#failed[@]} TOTAL=${#tests[@]}"
          if [ "${#failed[@]}" -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}" >&2
            exit 1
          fi
